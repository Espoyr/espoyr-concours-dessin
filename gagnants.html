<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gagnants - Concours Espoyr</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body { font-family: Arial, sans-serif; max-width: 1100px; margin: 30px auto; padding:0 15px; color:#222; font-size:18px; }
h1 { color:#2d6a4f; }
input, button { padding:10px; margin-top:6px; box-sizing:border-box; font-size:1em; }
button { background:#2d6a4f; color:#fff; border:0; border-radius:6px; cursor:pointer; margin-right:8px; }
table { border-collapse:collapse; width:100%; margin-top:18px; font-size:0.9em; }
th, td { border:1px solid #ccc; padding:6px 8px; text-align:left; }
th { background:#eef6f1; }
#diapo { background:#fff; border:1px solid #ddd; border-radius:10px; margin-top:18px; }
#diapo:fullscreen { background:#fff; padding:30px; display:flex; flex-direction:column; justify-content:center; border-radius:0; }
#slide { min-height:520px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
#nav { text-align:center; padding:12px; border-top:1px solid #eee; }
#compteur { margin:0 12px; color:#666; }
.titreCat { font-size:3em; color:#2d6a4f; font-weight:bold; }
.merci { font-size:2.6em; color:#ff9800; font-weight:bold; line-height:1.2; }
.prixBadge { background:#ff9800; color:#fff; font-size:1.4em; font-weight:bold; padding:6px 18px; border-radius:8px; }
.nomGrand { font-size:2.4em; font-weight:bold; margin:14px 0 4px; }
.votesGrand { font-size:1.2em; color:#666; margin-bottom:18px; }
.galerieSlide { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; }
.dessinSlide { width:220px; }
.dessinSlide img { width:100%; height:200px; object-fit:contain; border:1px solid #ccc; border-radius:6px; background:#fafafa; }
.dessinSlide .sousSlide { font-size:0.9em; color:#666; margin-top:4px; }
</style>
</head>
<body>
<h1>🏆 Gagnants — Concours Espoyr</h1>
<div id="zone">
  <p>Mot de passe administrateur<br><input type="password" id="mdp" style="width:280px;"></p>
  <button id="btnVoir">Charger les gagnants</button>
  <div id="msg" style="margin-top:10px;"></div>
</div>
<div id="modes" style="display:none; margin-top:16px;">
  <button id="btnTable">📊 Tableau Excel</button>
  <button id="btnProcla">🎤 Mode proclamation</button>
</div>
<div id="resultat"></div>

<script>
const supabaseUrl = "https://mqslyuelcvmrntbmjlnz.supabase.co"
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xc2x5dWVsY3Ztcm50Ym1qbG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzMxMzcsImV4cCI6MjA5NTU0OTEzN30.AdJeg4OnsBBzmIwH3NtktAbMSwa7EMzTq7JRzrk1a3M"
const enTetes = { "Content-Type":"application/json", "apikey":supabaseAnonKey, "Authorization":"Bearer "+supabaseAnonKey }
let gagnants = []
let slides = []
let slideIndex = 0

document.getElementById("btnVoir").addEventListener("click", charger)
document.getElementById("btnTable").addEventListener("click", afficherTable)
document.getElementById("btnProcla").addEventListener("click", proclamation)
document.addEventListener("keydown", touche)

async function charger(){
  const mdp = document.getElementById("mdp").value
  const msg = document.getElementById("msg")
  msg.textContent = "Chargement…"
  try{
    const r = await fetch(supabaseUrl+"/functions/v1/liste-gagnants",{method:"POST",headers:enTetes,body:JSON.stringify({admin_password:mdp})})
    const result = await r.json()
    if(result.code==="AUTH"){ msg.textContent="❌ Mot de passe incorrect."; return }
    if(!result.ok){ msg.textContent="❌ "+(result.erreur||"Erreur"); return }
    gagnants = result.gagnants || []
    msg.textContent = "✅ "+gagnants.length+" enfant(s). Choisis un affichage :"
    document.getElementById("modes").style.display = "block"
    afficherTable()
  }catch(err){ msg.textContent="Erreur réseau : "+err.message }
}

function afficherTable(){
  let html = "<button id='btnXls'>⬇️ Télécharger le fichier Excel</button>"
  html += "<table><tr><th>Prénom</th><th>Nom du parent</th><th>Email</th><th>Âge</th><th>Catégorie</th><th>Total votes</th><th>Pages gagnées</th><th>Lot (#)</th><th>Détail</th></tr>"
  gagnants.forEach(function(g){
    html += "<tr><td>"+g.prenom+"</td><td>"+g.nom_parent+"</td><td>"+g.email+"</td><td>"+g.age+"</td><td>"+g.categorie+"</td><td>"+g.total+"</td><td>"+g.pages+"</td><td>"+g.montant+"</td><td>"+g.detail+"</td></tr>"
  })
  html += "</table>"
  document.getElementById("resultat").innerHTML = html
  document.getElementById("btnXls").addEventListener("click", telecharger)
}

function telecharger(){
  const lignes = gagnants.map(function(g){
    return { "Prénom enfant": g.prenom, "Nom du parent": g.nom_parent, "Email": g.email, "Âge": g.age, "Catégorie": g.categorie, "Total votes": g.total, "Pages gagnées": g.pages, "Lot (#)": g.montant, "Détail": g.detail }
  })
  const ws = XLSX.utils.json_to_sheet(lignes)
  const wb = XLSX.utils.book_new()
  XLSX.utils.book_append_sheet(wb, ws, "Gagnants")
  XLSX.writeFile(wb, "gagnants-espoyr.xlsx")
}

function construireSlides(){
  const liste = []
  const cats = [["jeunes","Jeunes"],["grands","Grands"]]
  cats.forEach(function(c){
    const cat=c[0], label=c[1]
    const dansCat = gagnants.filter(function(g){ return g.categorie===cat })
    if(dansCat.length===0) return
    liste.push({type:"titre", titre:"Catégorie "+label})
    const pod = dansCat.filter(function(g){return g.tier==="podium"}).sort(function(a,b){return b.rang-a.rang})
    pod.forEach(function(g){ liste.push({type:"gagnant", g:g, prix:g.rang+(g.rang===1?"er":"e")+" prix"}) })
    const pg = dansCat.filter(function(g){return g.tier==="page"}).sort(function(a,b){return b.total-a.total})
    pg.forEach(function(g){ liste.push({type:"gagnant", g:g, prix:"Gagnant de page "+g.pages}) })
  })
  liste.push({type:"merci"})
  const co = gagnants.filter(function(g){return g.tier==="consolation"}).sort(function(a,b){return b.total-a.total})
  co.forEach(function(g){ liste.push({type:"gagnant", g:g, prix:"Lot de consolation"}) })
  return liste
}

function proclamation(){
  slides = construireSlides()
  if(slides.length===0){ document.getElementById("resultat").innerHTML="<p>Aucun gagnant.</p>"; return }
  slideIndex = 0
  document.getElementById("resultat").innerHTML =
    "<div id='diapo'><div id='slide'></div>"
    + "<div id='nav'><button id='prev'>← Précédent</button><span id='compteur'></span><button id='next'>Suivant →</button><button id='plein'>⛶ Plein écran</button></div></div>"
  document.getElementById("prev").addEventListener("click", function(){ allerA(slideIndex-1) })
  document.getElementById("next").addEventListener("click", function(){ allerA(slideIndex+1) })
  document.getElementById("plein").addEventListener("click", function(){ const el=document.getElementById("diapo"); if(el.requestFullscreen) el.requestFullscreen() })
  rendreSlide()
}

function allerA(i){
  if(i<0) i=0
  if(i>=slides.length) i=slides.length-1
  slideIndex=i
  rendreSlide()
}

function touche(e){
  if(!document.getElementById("slide")) return
  if(e.key==="ArrowRight") allerA(slideIndex+1)
  if(e.key==="ArrowLeft") allerA(slideIndex-1)
}

function rendreSlide(){
  const s = slides[slideIndex]
  let h = ""
  if(s.type==="titre"){ h = "<div class='titreCat'>"+s.titre+"</div>" }
  else if(s.type==="merci"){ h = "<div class='merci'>Merci à tous<br>nos participants !</div>" }
  else {
    const g = s.g
    h = "<div class='prixBadge'>"+s.prix+" — "+g.montant+"#</div>"
    h += "<div class='nomGrand'>"+g.prenom+" "+(g.nom_parent||"")+"</div>"
    h += "<div class='votesGrand'>"+g.total+" vote"+(g.total>1?"s":"")+"</div>"
    h += "<div class='galerieSlide'>"
    g.dessins.forEach(function(d){ h += "<div class='dessinSlide'><img src='"+d.image_url+"' alt=''><div class='sousSlide'>page "+d.page+" — "+d.votes+" v.</div></div>" })
    h += "</div>"
  }
  document.getElementById("slide").innerHTML = h
  document.getElementById("compteur").textContent = (slideIndex+1)+" / "+slides.length
}
</script>
</body>
</html>
