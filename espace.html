<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace participant</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; padding:0 15px; color:#222; }
h1 { color:#2d6a4f; }
input, select { padding:10px; margin-top:5px; width:100%; box-sizing:border-box; }
button { padding:12px; margin-top:12px; width:100%; background:#2d6a4f; color:white; border:0; border-radius:6px; cursor:pointer; font-size:1em; }
.box { border:1px solid #ccc; border-radius:8px; padding:20px; margin:20px 0; }
.enfant { border:1px solid #ddd; border-radius:8px; padding:15px; margin:15px 0; }
.enfantTete { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:6px; }
.recus { background:#2e7d32; color:white; font-weight:bold; padding:8px 14px; border-radius:6px; font-size:1.1em; }
.dessin { display:flex; align-items:center; gap:12px; border-bottom:1px solid #eee; padding:8px 0; }
.dessin img { width:60px; height:60px; object-fit:cover; border-radius:4px; }
.statut { font-size:0.85em; padding:2px 8px; border-radius:10px; background:#eee; }
.depot { margin-top:12px; background:#f7f7f7; padding:12px; border-radius:6px; }
.fichierBtn { display:inline-block; background:#2d6a4f; color:white; padding:10px 14px; border-radius:6px; cursor:pointer; font-size:0.95em; margin:4px 6px 4px 0; }
.fichierBtn input { display:none; }
.nomfichier { margin-top:8px; font-size:0.92em; color:#444; }
.msg { margin-top:8px; font-size:0.9em; }
small { color:#666; }
</style>
</head>
<body>
<h1>Mon espace participant</h1>
<div id="info">Vérification de la connexion…</div>

<div class="box">
<h2>Ajouter un enfant</h2>
<p>Prénom de l'enfant<br><input type="text" id="prenom"></p>
<p>Âge<br><input type="number" id="age"></p>
<p>Nom du parent<br><input type="text" id="nomParent"></p>
<button id="btnAjouter">Ajouter cet enfant</button>
<div id="messageAjout" class="msg"></div>
</div>

<div class="box">
<h2>Mes enfants et leurs dessins</h2>
<div id="listeEnfants">Chargement…</div>
</div>

<script>
const supabaseUrl = "https://mqslyuelcvmrntbmjlnz.supabase.co"
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xc2x5dWVsY3Ztcm50Ym1qbG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzMxMzcsImV4cCI6MjA5NTU0OTEzN30.AdJeg4OnsBBzmIwH3NtktAbMSwa7EMzTq7JRzrk1a3M"
const enTetes = { "Content-Type": "application/json", "apikey": supabaseAnonKey, "Authorization": "Bearer " + supabaseAnonKey }

const email = localStorage.getItem("espoyr_email_parent")
const code = localStorage.getItem("espoyr_code")
if (!email || !code) { location.href = "upload.html" }

let nombrePages = 10
let maxDessins = 6

function sessionExpiree() {
  localStorage.removeItem("espoyr_email_parent")
  localStorage.removeItem("espoyr_code")
  alert("Ta session a expiré. Reconnecte-toi avec ton code.")
  location.href = "upload.html"
}

async function chargerConfig() {
  try {
    const r = await fetch(supabaseUrl + "/rest/v1/parametres?select=cle,valeur", { headers: { apikey: supabaseAnonKey, Authorization: "Bearer " + supabaseAnonKey } })
    const lignes = await r.json()
    lignes.forEach(function(l){
      if (l.cle === "nombre_pages") nombrePages = parseInt(l.valeur, 10)
      if (l.cle === "nombre_max_dessins_par_enfant") maxDessins = parseInt(l.valeur, 10)
    })
  } catch (e) { console.error("config", e) }
}

function compresserImage(file) {
  return new Promise(function(resolve, reject){
    const reader = new FileReader()
    reader.onload = function(){
      const img = new Image()
      img.onload = function(){
        const maxSize = 1600
        let w = img.width, h = img.height
        if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize }
        else if (h >= w && h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize }
        const canvas = document.createElement("canvas")
        canvas.width = w; canvas.height = h
        canvas.getContext("2d").drawImage(img, 0, 0, w, h)
        resolve(canvas.toDataURL("image/jpeg", 0.8))
      }
      img.onerror = reject
      img.src = reader.result
    }
    reader.onerror = reject
    reader.readAsDataURL(file)
  })
}

function badgeStatut(s) {
  if (s === "accepte") return "<span class='statut' style='background:#d4edda;'>✅ accepté</span>"
  if (s === "refuse") return "<span class='statut' style='background:#f8d7da;'>refusé</span>"
  return "<span class='statut' style='background:#d4edda;'>✅ reçu</span>"
}

function majNom(inputId, spanId) {
  const inp = document.getElementById(inputId)
  const span = document.getElementById(spanId)
  if (!span) return
  if (inp && inp.files && inp.files[0]) span.textContent = "✅ Fichier choisi : " + inp.files[0].name
  else span.textContent = "Aucun fichier choisi pour l'instant."
}

function rendreEnfant(e) {
  const dessins = e.dessins || []
  const pagesUtilisees = dessins.map(function(d){ return d.page })
  let html = "<div class='enfant'>"
  html += "<div class='enfantTete'>"
  html += "<span><b>" + e.prenom_enfant + "</b> (" + e.age_enfant + " ans) — " + dessins.length + "/" + maxDessins + " dessins</span>"
  if (dessins.length > 0) html += "<span class='recus'>✅ DESSINS REÇUS</span>"
  html += "</div>"
  dessins.forEach(function(d){
    html += "<div class='dessin'><img src='" + d.image_url + "' alt=''><span>Page " + d.page + "</span> " + badgeStatut(d.statut) + "</div>"
  })
  if (dessins.length < maxDessins) {
    let opts = ""
    for (let p = 1; p <= nombrePages; p++) {
      if (pagesUtilisees.indexOf(p) === -1) opts += "<option value='" + p + "'>Page " + p + "</option>"
    }
    if (opts === "") {
      html += "<p><small>Toutes les pages disponibles ont déjà un dessin.</small></p>"
    } else {
      html += "<div class='depot'><p><b>Ajouter un dessin</b></p>"
      html += "<label>Page :</label><select id='page_" + e.id + "'>" + opts + "</select>"
      html += "<div style='margin-top:12px;'>"
      html += "<label class='fichierBtn'>📷 Prendre une photo<input type='file' accept='image/*' capture='environment' id='photo_" + e.id + "' onchange=\"majNom('photo_" + e.id + "','nom_" + e.id + "')\"></label>"
      html += "<label class='fichierBtn'>🖼️ Sélectionner une image<input type='file' accept='image/*' id='galerie_" + e.id + "' onchange=\"majNom('galerie_" + e.id + "','nom_" + e.id + "')\"></label>"
      html += "<div class='nomfichier' id='nom_" + e.id + "'>Aucun fichier choisi pour l'instant.</div>"
      html += "</div>"
      html += "<button onclick='deposerDessin(" + e.id + ")'>Confirmer l'envoi du dessin</button>"
      html += "<div class='msg' id='msgDepot_" + e.id + "'></div></div>"
    }
  } else {
    html += "<p><small>Limite de " + maxDessins + " dessins atteinte.</small></p>"
  }
  html += "</div>"
  return html
}

async function chargerEnfants() {
  try {
    const r = await fetch(supabaseUrl + "/functions/v1/liste-enfants", { method: "POST", headers: enTetes, body: JSON.stringify({ email: email, code: code }) })
    const result = await r.json()
    if (result.code === "AUTH") { sessionExpiree(); return }
    if (!result.success) { document.getElementById("listeEnfants").textContent = "Erreur : " + (result.message || "chargement impossible"); return }
    document.getElementById("info").innerHTML = "<b>Connecté :</b> " + email
    const enfants = result.enfants || []
    const zone = document.getElementById("listeEnfants")
    if (enfants.length === 0) { zone.textContent = "Aucun enfant inscrit pour le moment."; return }
    let html = ""
    enfants.forEach(function(e){ html += rendreEnfant(e) })
    zone.innerHTML = html
  } catch (err) {
    document.getElementById("listeEnfants").textContent = "Erreur réseau : " + err.message
  }
}

async function deposerDessin(participantId) {
  const page = document.getElementById("page_" + participantId).value
  const inputPhoto = document.getElementById("photo_" + participantId)
  const inputGalerie = document.getElementById("galerie_" + participantId)
  const msg = document.getElementById("msgDepot_" + participantId)
  let fichier = null
  if (inputPhoto && inputPhoto.files[0]) fichier = inputPhoto.files[0]
  else if (inputGalerie && inputGalerie.files[0]) fichier = inputGalerie.files[0]
  if (!fichier) { msg.textContent = "Prends une photo ou choisis une image d'abord."; return }
  msg.textContent = "Envoi de l'image…"
  try {
    const imageBase64 = await compresserImage(fichier)
    const r = await fetch(supabaseUrl + "/functions/v1/ajouter-dessin", {
      method: "POST", headers: enTetes,
      body: JSON.stringify({ email: email, code: code, participant_id: participantId, page: page, image_base64: imageBase64 })
    })
    const result = await r.json()
    if (result.code === "AUTH") { sessionExpiree(); return }
    if (!result.success) { console.log("ajouter-dessin", r.status, result); msg.textContent = "❌ " + (result.message || result.error || ("Erreur — code " + r.status)); return }
    msg.textContent = "✅ Dessin reçu."
    chargerEnfants()
  } catch (err) {
    msg.textContent = "Erreur : " + err.message
  }
}

async function ajouterEnfant() {
  const prenom = document.getElementById("prenom").value.trim()
  const age = document.getElementById("age").value.trim()
  const nomParent = document.getElementById("nomParent").value.trim()
  const msg = document.getElementById("messageAjout")
  msg.textContent = "Envoi…"
  try {
    const r = await fetch(supabaseUrl + "/functions/v1/ajouter-enfant", { method: "POST", headers: enTetes, body: JSON.stringify({ email: email, code: code, prenom: prenom, age: age, nom_parent: nomParent }) })
    const result = await r.json()
    if (result.code === "AUTH") { sessionExpiree(); return }
    if (!result.success) { msg.textContent = "❌ " + (result.message || "Erreur"); return }
    msg.textContent = "✅ " + prenom + " a bien été ajouté."
    document.getElementById("prenom").value = ""
    document.getElementById("age").value = ""
    chargerEnfants()
  } catch (err) {
    msg.textContent = "Erreur réseau : " + err.message
  }
}

window.deposerDessin = deposerDessin
window.majNom = majNom
document.getElementById("btnAjouter").addEventListener("click", ajouterEnfant)
chargerConfig().then(chargerEnfants)
</script>
</body>
</html>
