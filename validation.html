<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validation des dessins - Espoyr</title>
<style>
body { font-family: Arial, sans-serif; max-width: 1000px; margin: 30px auto; padding:0 15px; color:#222; }
h1 { color:#2d6a4f; }
input { padding:10px; margin-top:5px; width:100%; box-sizing:border-box; }
button { padding:10px 14px; border:0; border-radius:6px; cursor:pointer; color:white; }
.box { border:1px solid #ccc; border-radius:8px; padding:20px; margin:20px 0; }
.tableau { display:flex; flex-wrap:wrap; gap:15px; }
.carte-stat { background:#eef6f1; border-radius:8px; padding:12px 18px; min-width:110px; text-align:center; }
.carte-stat b { font-size:1.6em; color:#2d6a4f; display:block; }
.parPage { margin-top:15px; font-size:0.95em; line-height:1.8; }
.dessin { display:flex; align-items:center; gap:14px; border-bottom:1px solid #eee; padding:12px 0; flex-wrap:wrap; }
.dessin img { width:80px; height:80px; object-fit:cover; border-radius:4px; cursor:pointer; }
.infos { flex:1; min-width:180px; }
.statut { font-size:0.85em; padding:2px 8px; border-radius:10px; background:#eee; }
.btn-ok { background:#2d6a4f; }
.btn-non { background:#b23b3b; }
.actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
small { color:#666; }
</style>
</head>
<body>
<h1>Validation des dessins</h1>

<div id="connexion" class="box">
<h2>Accès administrateur</h2>
<p>Mot de passe<br><input type="password" id="motDePasse"></p>
<button class="btn-ok" id="btnConnexion">Entrer</button>
<div id="msgConnexion" style="margin-top:10px;"></div>
</div>

<div id="appli" style="display:none;">
<div class="box">
<h2>Tableau de bord</h2>
<div class="tableau">
<div class="carte-stat"><b id="statDeposes">0</b>déposés</div>
<div class="carte-stat"><b id="statValides">0</b>validés</div>
<div class="carte-stat"><b id="statAttente">0</b>en attente</div>
<div class="carte-stat"><b id="statRefuses">0</b>refusés</div>
</div>
<div class="parPage"><b>Proposés au vote, par page :</b><br><span id="repartition">—</span></div>
</div>

<div class="box">
<h2>Tous les dessins</h2>
<div id="liste">Chargement…</div>
</div>
</div>

<script>
const supabaseUrl = "https://mqslyuelcvmrntbmjlnz.supabase.co"
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xc2x5dWVsY3Ztcm50Ym1qbG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzMxMzcsImV4cCI6MjA5NTU0OTEzN30.AdJeg4OnsBBzmIwH3NtktAbMSwa7EMzTq7JRzrk1a3M"
const enTetes = { "Content-Type": "application/json", "apikey": supabaseAnonKey, "Authorization": "Bearer " + supabaseAnonKey }

let motDePasse = localStorage.getItem("espoyr_admin_pwd") || ""
let nombrePages = 10

function badgeStatut(s) {
  if (s === "accepte") return "<span class='statut' style='background:#d4edda;'>accepté</span>"
  if (s === "refuse") return "<span class='statut' style='background:#f8d7da;'>refusé</span>"
  return "<span class='statut'>en attente</span>"
}

async function chargerPages() {
  try {
    const r = await fetch(supabaseUrl + "/rest/v1/parametres?select=cle,valeur", { headers: { apikey: supabaseAnonKey, Authorization: "Bearer " + supabaseAnonKey } })
    const lignes = await r.json()
    lignes.forEach(function(l){ if (l.cle === "nombre_pages") nombrePages = parseInt(l.valeur, 10) })
  } catch (e) { console.error(e) }
}

async function charger() {
  const liste = document.getElementById("liste")
  try {
    const r = await fetch(supabaseUrl + "/functions/v1/liste-dessins-admin", { method: "POST", headers: enTetes, body: JSON.stringify({ admin_password: motDePasse }) })
    const result = await r.json()
    if (result.code === "AUTH") {
      localStorage.removeItem("espoyr_admin_pwd")
      document.getElementById("appli").style.display = "none"
      document.getElementById("connexion").style.display = "block"
      document.getElementById("msgConnexion").textContent = "❌ Mot de passe incorrect."
      return
    }
    if (!result.ok) { liste.textContent = "Erreur : " + (result.erreur || "chargement impossible"); return }

    document.getElementById("connexion").style.display = "none"
    document.getElementById("appli").style.display = "block"

    const dessins = result.dessins || []
    afficherStats(dessins)
    afficherListe(dessins)
  } catch (err) {
    liste.textContent = "Erreur réseau : " + err.message
  }
}

function afficherStats(dessins) {
  let valides = 0, attente = 0, refuses = 0
  let parPage = {}
  dessins.forEach(function(d){
    if (d.statut === "accepte") { valides++; parPage[d.page] = (parPage[d.page] || 0) + 1 }
    else if (d.statut === "refuse") refuses++
    else attente++
  })
  document.getElementById("statDeposes").textContent = dessins.length
  document.getElementById("statValides").textContent = valides
  document.getElementById("statAttente").textContent = attente
  document.getElementById("statRefuses").textContent = refuses

  let html = ""
  for (let p = 1; p <= nombrePages; p++) {
    html += "Page " + p + " : <b>" + (parPage[p] || 0) + "</b> &nbsp;&nbsp; "
  }
  document.getElementById("repartition").innerHTML = html
}

function afficherListe(dessins) {
  const zone = document.getElementById("liste")
  if (dessins.length === 0) { zone.textContent = "Aucun dessin déposé pour le moment."; return }
  const ordre = { "en_attente": 0, "accepte": 1, "refuse": 2 }
  dessins.sort(function(a, b){
    if (ordre[a.statut] !== ordre[b.statut]) return ordre[a.statut] - ordre[b.statut]
    return a.page - b.page
  })
  let html = ""
  dessins.forEach(function(d){
    html += "<div class='dessin'>"
    html += "<a href='" + d.image_url + "' target='_blank'><img src='" + d.image_url + "' alt=''></a>"
    html += "<div class='infos'><b>" + d.prenom_enfant + "</b> (" + d.age_enfant + " ans) — page " + d.page + "<br>"
    html += "<small>" + d.nom_parent + " · " + d.email_parent + "</small><br>" + badgeStatut(d.statut) + "</div>"
    html += "<div class='actions' id='actions_" + d.id + "'>"
    if (d.statut !== "accepte") html += "<button class='btn-ok' onclick='demander(" + d.id + ", \"accepte\")'>Accepter</button>"
    if (d.statut !== "refuse") html += "<button class='btn-non' onclick='demander(" + d.id + ", \"refuse\")'>Refuser</button>"
    html += "</div></div>"
  })
  zone.innerHTML = html
}

function demander(dessinId, decision) {
  const zone = document.getElementById("actions_" + dessinId)
  if (!zone) return
  const mot = decision === "accepte" ? "Accepter" : "Refuser"
  const couleur = decision === "accepte" ? "btn-ok" : "btn-non"
  zone.innerHTML = "<span style='margin-right:6px;'>Confirmer ?</span>" +
    "<button class='" + couleur + "' onclick='executer(" + dessinId + ", \"" + decision + "\")'>Oui, " + mot + "</button> " +
    "<button style='background:#888;' onclick='charger()'>Annuler</button>"
}

async function executer(dessinId, decision) {
  const zone = document.getElementById("actions_" + dessinId)
  if (zone) zone.innerHTML = "Enregistrement…"
  try {
    const r = await fetch(supabaseUrl + "/functions/v1/valider-dessin", { method: "POST", headers: enTetes, body: JSON.stringify({ admin_password: motDePasse, dessin_id: dessinId, decision: decision }) })
    const result = await r.json()
    if (!result.ok) { if (zone) zone.innerHTML = "<span style='color:#b23b3b;'>Erreur : " + (result.erreur || "action impossible") + "</span>"; return }
    charger()
  } catch (err) {
    if (zone) zone.innerHTML = "<span style='color:#b23b3b;'>Erreur réseau : " + err.message + "</span>"
  }
}

window.demander = demander
window.executer = executer
window.charger = charger

document.getElementById("btnConnexion").addEventListener("click", function(){
  motDePasse = document.getElementById("motDePasse").value
  localStorage.setItem("espoyr_admin_pwd", motDePasse)
  document.getElementById("msgConnexion").textContent = "Connexion…"
  charger()
})

chargerPages()
if (motDePasse) { charger() }
</script>
</body>
</html>
