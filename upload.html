<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envoyer mon dessin</title>
</head>

<body>

<h1>Envoyer mon dessin</h1>

<form id="uploadForm">
  <p>Prénom<br><input type="text" id="prenom" required></p>
  <p>Âge<br><input type="number" id="age" min="4" max="18" required></p>
  <p>Email<br><input type="email" id="email" required></p>
  <p>Numéro de page<br><input type="number" id="page" min="1" required></p>
  <p>Image<br><input type="file" id="image" accept=".jpg,.jpeg,.png" required></p>

  <p>
    <label>
      <input type="checkbox" id="engagement" required>
      Je certifie sur l’honneur que le dessin envoyé a été réalisé à la main par le participant.
      Si ce dessin est classé parmi les deux premiers, je m’engage à envoyer l’original dans les 7 jours à :
      ASBL Espoyr, rue de l’Entente 7, 4140 Sprimont.
    </label>
  </p>

  <button id="submitBtn" type="submit">Envoyer mon dessin</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = 'https://mqslyuelcvmrntbmjlnz.supabase.co'
const supabaseKey = 'sb_publishable_5vPnmzaFvNMV7RW4BwVL1w_lnPzDyeQ'

const client = window.supabase.createClient(supabaseUrl, supabaseKey)

document.getElementById('uploadForm').addEventListener('submit', async function(e){
  e.preventDefault()

  const btn = document.getElementById('submitBtn')
  btn.disabled = true
  btn.textContent = 'Envoi en cours...'

  try {
    const prenom = document.getElementById('prenom').value.trim()
    const age = Number(document.getElementById('age').value)
    const email = document.getElementById('email').value.trim().toLowerCase()
    const page = Number(document.getElementById('page').value)
    const file = document.getElementById('image').files[0]
    const engagement = document.getElementById('engagement').checked

    if(!prenom) throw new Error('Veuillez indiquer le prénom.')
    if(age < 4 || age > 18) throw new Error("L'âge doit être compris entre 4 et 18 ans.")
    if(!email || !email.includes('@')) throw new Error('Veuillez indiquer une adresse email valide.')
    if(page < 1) throw new Error('Veuillez indiquer un numéro de page valide.')
    if(!file) throw new Error('Choisissez une image.')
    if(file.size > 10 * 1024 * 1024) throw new Error('Image trop volumineuse : maximum 10 Mo.')
    if(!['image/png', 'image/jpeg'].includes(file.type)) throw new Error('Format accepté : JPG, JPEG ou PNG.')
    if(!engagement) throw new Error("Vous devez accepter l'engagement sur l'honneur.")

    const total = await client
      .from('participations')
      .select('id')
      .eq('email', email)

    if(total.error) throw new Error(total.error.message)

    if(total.data.length >= 10){
      throw new Error('Vous avez déjà envoyé 10 dessins avec cette adresse email.')
    }

    const dejaPage = total.data.length > 0
      ? await client
          .from('participations')
          .select('id')
          .eq('email', email)
          .eq('page', page)
      : { data: [] }

    if(dejaPage.error) throw new Error(dejaPage.error.message)

    if(dejaPage.data.length > 0){
      throw new Error('Vous avez déjà envoyé un dessin pour cette page.')
    }

    const numeroDessin = total.data.length + 1

    const nomNettoye = file.name
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9._-]/g, "_")

    const nomFichier = Date.now() + "_" + nomNettoye

    const upload = await client.storage
      .from('dessins')
      .upload(nomFichier, file)

    if(upload.error) throw new Error('Erreur image : ' + upload.error.message)

    const insertion = await client
      .from('participations')
      .insert({
        prenom: prenom,
        age: age,
        email: email,
        page: page,
        image_url: nomFichier,
        engagement: true,
        email_confirmation: false,
        code_confirmation: null,
        code_connexion: null,
        statut: 'recu',
        dossier_valide_participant: false,
        visible_vote: false,
        numero_dessin: numeroDessin,
        date_validation: null,
        date_validation_participant: null
      })

    if(insertion.error) throw new Error('Image envoyée, mais erreur données : ' + insertion.error.message)

    alert('Dessin et informations envoyés avec succès.')
    document.getElementById('uploadForm').reset()

  } catch(error) {
    alert(error.message)
    console.error(error)
  }

  btn.disabled = false
  btn.textContent = 'Envoyer mon dessin'
})
</script>

</body>
</html>
