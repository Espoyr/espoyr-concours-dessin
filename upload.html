<!DOCTYPE html>

  <title>Envoyer mon dessin - Espoyr</title>

  <style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'https://mqslyuelcvmrntbmjlnz.supabase.co'
const supabaseKey = 'COLLE_ICI_TA_CLE_PUBLISHABLE'

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

document.querySelector("form").addEventListener("submit", async (e) => {
  e.preventDefault()

  const prenom = document.getElementById("prenom").value
  const age = document.getElementById("age").value
  const email = document.getElementById("email").value
  const page = document.getElementById("page").value
  const file = document.getElementById("image").files[0]

  const fileName = Date.now() + "_" + file.name

  const { data, error } = await supabase.storage
    .from('dessins')
    .upload(fileName, file)

  if (error) {
    alert("Erreur : " + error.message)
    return
  }

  alert("Dessin envoyé avec succès !")

  document.querySelector("form").reset()
})
</script>

<body>

<header>
  <h1>Envoyer mon dessin</h1>
  <p>Concours de dessin Espoyr</p>
</header>

<div class="container">
  <div class="card">

    <div class="info">
      Le dessin doit être envoyé en format JPG ou PNG.
      Il sera vérifié avant d’être affiché pour le vote.
    </div>

    <form>
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" required>

      <label for="age">Âge</label>

      <label for="email">Email du parent ou du participant</label>
      <input type="email" id="email" name="email" required>

      <label for="page">Numéro de la page illustrée</label>
      <input type="number" id="page" name="page" min="1" required>

      <label for="image">Image du dessin</label>
      <input type="file" id="image" name="image" accept="image/png, image/jpeg" required lang="fr">

    </form>
