<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion concours Espoyr</title>
</head>
<body>

<h1>Concours de dessin Espoyr</h1>

<h2>1. Recevoir mon code</h2>

<form id="demandeCodeForm">
  <p>Email du parent<br>
    <input type="email" id="emailDemande" required>
  </p>
  <button type="submit">Recevoir mon code</button>
</form>

<hr>

<h2>2. Me connecter avec mon code</h2>

<form id="connexionForm">
  <p>Email du parent<br>
    <input type="email" id="emailConnexion" required>
  </p>

  <p>Code reçu par email<br>
    <input type="text" id="codeConnexion" required>
  </p>

  <button type="submit">Me connecter</button>
</form>

<hr>

<div id="message"></div>

<script>
const supabaseUrl = "https://mqslyuelcvmrntbmjlnz.supabase.co"
const envoyerCodeUrl = supabaseUrl + "/functions/v1/envoyer-code"
const verifierCodeUrl = supabaseUrl + "/functions/v1/verifier-code"

document.getElementById("demandeCodeForm").addEventListener("submit", async function(e) {
  e.preventDefault()

  const email = document.getElementById("emailDemande").value.trim().toLowerCase()
  const message = document.getElementById("message")

  message.innerHTML =
    "<h3>Demande de code</h3>" +
    "<pre>" + JSON.stringify({ email_envoye: email }, null, 2) + "</pre>"

  try {
    const response = await fetch(envoyerCodeUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email
      })
    })

    const result = await response.json()

    message.innerHTML +=
      "<h3>Réponse de envoyer-code</h3>" +
      "<pre>" + JSON.stringify(result, null, 2) + "</pre>"

    if (!response.ok || result.success === false) {
      message.innerHTML += "<p>Erreur lors de l’envoi du code.</p>"
      return
    }

    document.getElementById("emailConnexion").value = email

    message.innerHTML +=
      "<p>Un code vient d’être envoyé à : <strong>" + email + "</strong></p>"

  } catch (error) {
    message.innerHTML +=
      "<h3>Erreur réseau envoyer-code</h3>" +
      "<pre>" + error.message + "</pre>"
  }
})

document.getElementById("connexionForm").addEventListener("submit", async function(e) {
  e.preventDefault()

  const email = document.getElementById("emailConnexion").value.trim().toLowerCase()
  const code = document.getElementById("codeConnexion").value.trim()
  const message = document.getElementById("message")

  message.innerHTML =
    "<h3>Valeurs envoyées à verifier-code</h3>" +
    "<pre>" + JSON.stringify({
      email_envoye: email,
      code_envoye: code
    }, null, 2) + "</pre>"

  try {
    const response = await fetch(verifierCodeUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        code: code
      })
    })

    const result = await response.json()

    message.innerHTML +=
      "<h3>Réponse de verifier-code</h3>" +
      "<pre>" + JSON.stringify(result, null, 2) + "</pre>"

    if (result.comparaison === true || result.ok === true) {
      localStorage.setItem("espoyr_email_parent", email)

      message.innerHTML +=
        "<p><strong>Connexion réussie ✅</strong></p>" +
        "<p><a href='espace.html'>Aller à mon espace participant</a></p>"
    } else {
      message.innerHTML +=
        "<p><strong>Connexion refusée ❌</strong></p>"
    }

  } catch (error) {
    message.innerHTML +=
      "<h3>Erreur réseau verifier-code</h3>" +
      "<pre>" + error.message + "</pre>"
  }
})
</script>

</body>
</html>
