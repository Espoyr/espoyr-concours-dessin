<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion concours Espoyr</title>
<style>
body { font-family: Arial; max-width: 900px; margin: 30px auto; }
input, button { padding: 10px; margin-top: 5px; width: 100%; }
button { background: #2d6a4f; color: white; border: 0; cursor: pointer; }
pre { background: #f1f1f1; padding: 15px; white-space: pre-wrap; }
.box { border: 1px solid #ccc; padding: 20px; margin: 20px 0; }
</style>
</head>
<body>
<h1>Concours de dessin Espoyr</h1>
<div class="box">
<h2>1. Recevoir mon code</h2>
<form id="demandeCodeForm">
<p>Email du parent<br><input type="email" id="emailDemande" required></p>
<button type="submit">Recevoir mon code</button>
</form>
</div>
<div class="box">
<h2>2. Me connecter avec mon code</h2>
<form id="connexionForm">
<p>Email du parent<br><input type="email" id="emailConnexion" required></p>
<p>Code reçu par email<br><input type="text" id="codeConnexion" required></p>
<button type="submit">Me connecter</button>
</form>
</div>
<div class="box">
<h2>Diagnostic</h2>
<div id="message">Aucune action pour le moment.</div>
</div>
<script>
const supabaseUrl = "https://mqslyuelcvmrntbmjlnz.supabase.co"

// >>> COLLE ICI TA CLE ANON (Settings > API > Project API keys > anon public) <
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xc2x5dWVsY3Ztcm50Ym1qbG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzMxMzcsImV4cCI6MjA5NTU0OTEzN30.AdJeg4OnsBBzmIwH3NtktAbMSwa7EMzTq7JRzrk1a3M"

const envoyerCodeUrl = supabaseUrl + "/functions/v1/envoyer-code"
const verifierCodeUrl = supabaseUrl + "/functions/v1/verifier-code"

// En-tetes communs aux deux appels : la cle anon debloque la passerelle Supabase
const enTetes = {
  "Content-Type": "application/json",
  "apikey": supabaseAnonKey,
  "Authorization": "Bearer " + supabaseAnonKey
}

function bloc(titre, contenu) {
  return "<h3>" + titre + "</h3><pre>" +
    JSON.stringify(contenu, null, 2) +
    "</pre>"
}

document.getElementById("demandeCodeForm").addEventListener("submit", async function(e) {
  e.preventDefault()
  const email = document.getElementById("emailDemande").value.trim().toLowerCase()
  const message = document.getElementById("message")
  const donneesEnvoyees = { email: email }
  message.innerHTML = bloc("1. Valeurs envoyées à envoyer-code", donneesEnvoyees)
  try {
    const response = await fetch(envoyerCodeUrl, {
      method: "POST",
      headers: enTetes,
      body: JSON.stringify(donneesEnvoyees)
    })
    const result = await response.json()
    message.innerHTML += bloc("2. Réponse reçue de envoyer-code", result)
    if (response.ok && result.success !== false) {
      document.getElementById("emailConnexion").value = email
      message.innerHTML += "<p><strong>Code envoyé ✅</strong></p>"
    } else {
      message.innerHTML += "<p><strong>Erreur envoi code ❌</strong></p>"
    }
  } catch (error) {
    message.innerHTML += bloc("Erreur réseau envoyer-code", { erreur: error.message })
  }
})

document.getElementById("connexionForm").addEventListener("submit", async function(e) {
  e.preventDefault()
  const email = document.getElementById("emailConnexion").value.trim().toLowerCase()
  const code = document.getElementById("codeConnexion").value.trim()
  const message = document.getElementById("message")
  const donneesEnvoyees = {
    email: email,
    code: code
  }
  message.innerHTML = bloc("1. Valeurs envoyées à verifier-code", donneesEnvoyees)
  try {
    const response = await fetch(verifierCodeUrl, {
      method: "POST",
      headers: enTetes,
      body: JSON.stringify(donneesEnvoyees)
    })
    const result = await response.json()
    message.innerHTML += bloc("2. Réponse reçue de verifier-code", result)
    if (result.comparaison === true || result.ok === true) {
      localStorage.setItem("espoyr_email_parent", email)
      message.innerHTML += "<p><strong>Connexion réussie ✅</strong></p>"
      message.innerHTML += "<p><a href='espace.html'>Aller à mon espace participant</a></p>"
    } else {
      message.innerHTML += "<p><strong>Connexion refusée ❌</strong></p>"
    }
  } catch (error) {
    message.innerHTML += bloc("Erreur réseau verifier-code", { erreur: error.message })
  }
})
</script>
</body>
</html>
