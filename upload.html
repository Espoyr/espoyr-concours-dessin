<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envoyer mon dessin</title>
</head>

<body>

<h1>Envoyer mon dessin</h1>

<form id="uploadForm">

<p>
Prénom<br>
<input type="text" id="prenom" required>
</p>

<p>
Âge<br>
<input type="number" id="age" required>
</p>

<p>
Email<br>
<input type="email" id="email" required>
</p>

<p>
Numéro de page<br>
<input type="number" id="page" required>
</p>

<p>
Image<br>
<input type="file" id="image" accept=".jpg,.jpeg,.png" required>
</p>

<button type="submit">
Envoyer mon dessin
</button>

</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl =
'https://mqslyuelcvmrntbmjlnz.supabase.co'

const supabaseKey =
'METTRE_ICI_VOTRE_CLE_PUBLISHABLE'

const client =
window.supabase.createClient(
supabaseUrl,
supabaseKey
)

document
.getElementById('uploadForm')
.addEventListener('submit', async function(e){

e.preventDefault()

const file =
document.getElementById('image').files[0]

if(!file){
alert('Choisissez une image')
return
}

const nom =
Date.now() + '_' + file.name

const { error } =
await client.storage
.from('dessins')
.upload(nom,file)

if(error){
alert(error.message)
console.error(error)
return
}

alert('Dessin envoyé avec succès')

})

</script>

</body>
</html>
