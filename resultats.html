<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats - Concours Espoyr</title>
<style>
body { font-family: Arial, sans-serif; max-width: 1000px; margin: 30px auto; padding:0 15px; color:#222; font-size:19px; }
h1 { color:#2d6a4f; }
h2 { font-size:1.3em; margin-top:30px; border-bottom:2px solid #2d6a4f; padding-bottom:4px; }
.gros { font-size:1.2em; text-align:center; padding:30px; }
.galerie { display:flex; flex-wrap:wrap; gap:16px; margin-top:12px; }
.carte { width:170px; border:1px solid #ddd; border-radius:8px; padding:8px; text-align:center; background:#fafafa; position:relative; }
.carte img { width:100%; height:150px; object-fit:cover; border-radius:5px; display:block; }
.carte .nom { margin-top:6px; font-weight:bold; }
.carte .votes { margin-top:2px; color:#555; font-size:0.9em; }
.carte.gagnant { border:3px solid #ff9800; background:#fff7e6; }
.trophy { position:absolute; top:-14px; right:-10px; font-size:1.8em; }
.total { text-align:center; color:#555; margin-top:6px; }
</style>
</head>
<body>
<h1>🏆 Résultats du concours</h1>
<div id="contenu" class="gros">Chargement…</div>

<script>
const supabaseUrl = "https://mqslyuelcvmrntbmjlnz.supabase.co"
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xc2x5dWVsY3Ztcm50Ym1qbG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzMxMzcsImV4cCI6MjA5NTU0OTEzN30.AdJeg4OnsBBzmIwH3NtktAbMSwa7EMzTq7JRzrk1a3M"
const enTetes = { "Content-Type":"application/json", "apikey":supabaseAnonKey, "Authorization":"Bearer "+supabaseAnonKey }

function fmt(d){ if(!d) return ""; return new Date(d).toLocaleDateString("fr-BE",{timeZone:"Europe/Brussels",day:"numeric",month:"long",year:"numeric"}) }

async function charger(){
  const c = document.getElementById("contenu")
  try{
    const r = await fetch(supabaseUrl+"/functions/v1/resultats",{method:"POST",headers:enTetes,body:JSON.stringify({})})
    const result = await r.json()
    if(!result.ok){ c.innerHTML="<p>Erreur : "+(result.erreur||"")+"</p>"; return }
    if(result.etat==="avant"){ c.className="gros"; c.innerHTML="<p>🗓️ Les résultats seront publiés le <b>"+fmt(result.date_resultats)+"</b>.</p>"; return }
    const pages = result.pages || []
    if(pages.length===0){ c.className="gros"; c.innerHTML="<p>Aucun dessin à afficher.</p>"; return }
    c.className=""
    let html = "<p class='total'>Total des votes : "+(result.totalVotes||0)+"</p>"
    pages.forEach(function(pg){
      let max=0
      pg.dessins.forEach(function(d){ if(d.votes>max) max=d.votes })
      html += "<h2>Page "+pg.page+"</h2><div class='galerie'>"
      pg.dessins.forEach(function(d){
        const gagnant = (max>0 && d.votes===max)
        html += "<div class='carte"+(gagnant?" gagnant":"")+"'>"
          + (gagnant?"<div class='trophy'>🏆</div>":"")
          + "<img src='"+d.image_url+"' alt=''>"
          + "<div class='nom'>"+(d.prenom||"")+"</div>"
          + "<div class='votes'>"+d.votes+" vote"+(d.votes>1?"s":"")+"</div>"
          + "</div>"
      })
      html += "</div>"
    })
    c.innerHTML = html
  }catch(err){ c.innerHTML="<p>Erreur réseau : "+err.message+"</p>" }
}
charger()
</script>
</body>
</html>
