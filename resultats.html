<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats - Concours Espoyr</title>
<style>
body { font-family: Arial, sans-serif; max-width: 1000px; margin: 30px auto; padding:0 15px; color:#222; }
h1, h2 { color:#2d6a4f; }
.box { border:1px solid #ccc; border-radius:8px; padding:20px; margin:20px 0; }
.lots { background:#fff3e0; border:2px solid #ff9800; }
.cat { border:1px solid #ddd; border-radius:8px; padding:15px; margin:15px 0; }
.rang { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid #eee; }
.medaille { font-size:1.4em; width:30px; text-align:center; }
.pageBloc { border:1px solid #ddd; border-radius:8px; padding:15px; margin:15px 0; }
.gagnants { display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; }
.gagnant { width:160px; text-align:center; }
.gagnant img { width:100%; height:150px; object-fit:cover; border-radius:6px; }
.gros { font-size:1.2em; text-align:center; padding:30px; }
small { color:#666; }
</style>
</head>
<body>
<h1>🏆 Résultats du concours</h1>
<div id="contenu" class="gros">Chargement…</div>

<script>
const supabaseUrl = "https://mqslyuelcvmrntbmjlnz.supabase.co"
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xc2x5dWVsY3Ztcm50Ym1qbG56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzMxMzcsImV4cCI6MjA5NTU0OTEzN30.AdJeg4OnsBBzmIwH3NtktAbMSwa7EMzTq7JRzrk1a3M"
const enTetes = { "Content-Type": "application/json", "apikey": supabaseAnonKey, "Authorization": "Bearer " + supabaseAnonKey }

let P = {}

function fmt(d) {
  if (!d) return ""
  return new Date(d).toLocaleDateString("fr-BE", { timeZone: "Europe/Brussels", day: "numeric", month: "long", year: "numeric" })
}
function medaille(i) { return i === 0 ? "🥇" : (i === 1 ? "🥈" : (i === 2 ? "🥉" : "")) }
function val(cle) { return P[cle] !== undefined ? P[cle] : "?" }

function blocLots() {
  const seuil = val("age_seuil_categorie")
  const cumul = (val("lots_cumulables") + "").toLowerCase()
  let h = "<div class='box lots'><h2>🎁 Les lots</h2>"
  h += "<p>Les points d'un enfant = le total des voix de <b>tous ses dessins</b> — plus on participe, plus on a de chances !</p>"
  h += "<p><b>Catégorie moins de " + seuil + " ans :</b> 1ᵉʳ " + val("lot_jeunes_1") + " #, 2ᵉ " + val("lot_jeunes_2") + " #, 3ᵉ " + val("lot_jeunes_3") + " #</p>"
  h += "<p><b>Catégorie " + seuil + " ans et plus :</b> 1ᵉʳ " + val("lot_grands_1") + " #, 2ᵉ " + val("lot_grands_2") + " #, 3ᵉ " + val("lot_grands_3") + " #</p>"
  h += "<p><b>Gagnant de chaque page :</b> " + val("lot_intermediaire") + " #</p>"
  h += "<p><b>Lot de consolation</b> (tous les autres) : " + val("lot_consolation") + " # — à réclamer en nous envoyant une <b>enveloppe affranchie à ta propre adresse</b>.</p>"
  h += "<p><small>Les lots " + (cumul === "oui" ? "sont cumulables." : "ne sont pas cumulables : chacun reçoit son meilleur lot.") + "</small></p>"
  h += "<p style='margin-top:10px;'>📮 Les auteurs des <b>deux dessins gagnants de chaque page</b> sont invités à nous envoyer l'<b>original</b> par courrier avant le <b>" + fmt(val("date_envoi_original")) + "</b> à :<br><b>rue de l'Entente N°7, 4140 Sprimont</b>.<br>L'original sera rendu après le tirage.</p>"
  h += "</div>"
  return h
}

function blocCategorie(titre, liste, prefixe) {
  let h = "<div class='cat'><h3>" + titre + "</h3>"
  if (!liste || liste.length === 0) { h += "<p><small>Aucun participant dans cette catégorie.</small></p></div>"; return h }
  liste.forEach(function(a, i){
    h += "<div class='rang'><span class='medaille'>" + medaille(i) + "</span><span><b>" + a.prenom + "</b> (" + a.age + " ans) — " + a.points + " voix → <b>" + val(prefixe + "_" + (i + 1)) + " #</b></span></div>"
  })
  h += "</div>"
  return h
}

async function charger() {
  const c = document.getElementById("contenu")
  try {
    const r = await fetch(supabaseUrl + "/functions/v1/resultats", { method: "POST", headers: enTetes, body: "{}" })
    const result = await r.json()
    if (!result.ok) { c.innerHTML = "<p>Erreur : " + (result.erreur || "") + "</p>"; return }
    if (result.etat === "avant") { c.className = "gros"; c.innerHTML = "<p>🗓️ Les résultats seront annoncés le <b>" + fmt(result.date_resultats) + "</b>.</p>"; return }

    c.className = ""
    let html = blocLots()
    html += "<h2>🏅 Gagnants par catégorie</h2>"
    html += blocCategorie("Moins de " + result.seuil + " ans", result.jeunes, "lot_jeunes")
    html += blocCategorie(result.seuil + " ans et plus", result.grands, "lot_grands")
    html += "<h2>📖 Gagnants par page</h2>"
    const pages = result.pages || []
    if (pages.length === 0) { html += "<p>Aucun vote enregistré.</p>" }
    pages.forEach(function(pg){
      html += "<div class='pageBloc'><h3>Page " + pg.page + "</h3><div class='gagnants'>"
      pg.top.forEach(function(d, i){
        html += "<div class='gagnant'><img src='" + d.image_url + "' alt=''><div>" + medaille(i) + " <b>" + d.prenom + "</b><br>" + d.votes + " voix</div></div>"
      })
      html += "</div></div>"
    })
    c.innerHTML = html
  } catch (err) { c.innerHTML = "<p>Erreur réseau : " + err.message + "</p>" }
}

async function init() {
  const c = document.getElementById("contenu")
  try {
    const r = await fetch(supabaseUrl + "/rest/v1/parametres?select=cle,valeur", { headers: { apikey: supabaseAnonKey, Authorization: "Bearer " + supabaseAnonKey } })
    const lignes = await r.json()
    lignes.forEach(function(l){ P[l.cle] = l.valeur })
    charger()
  } catch (e) { c.innerHTML = "<p>Erreur de chargement, réessaie.</p>" }
}
init()
</script>
</body>
</html>
